<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>我的导航 - 快速访问您的常用网站</title>
    <link href="lib/bootstrap.min.css" rel="stylesheet" type="text/css">
    <link href="index.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="container-fluid py-4">
    <!-- 顶部搜索和时间区域 -->
    <div class="top-section mb-4">
        <div class="search-container">
            <input class="search-input" id="searchInput" placeholder="搜索网站..." type="text">
            <button class="search-btn" id="searchBtn">
                <svg fill="currentColor" height="20" viewBox="0 0 16 16" width="20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                </svg>
            </button>
        </div>
        <div class="time-display" id="timeDisplay"></div>
    </div>

    <div class="row g-4">
        <!-- 左侧导航 -->
        <div class="col-lg-3 col-xl-2">
            <div class="sidebar sticky-lg-top pt-4" id="sidebar">
                <div class="nav-list" id="title"></div>
            </div>
        </div>

        <!-- 右侧内容 -->
        <div class="col-lg-9 col-xl-10">
            <div class="links-grid" id="body"></div>
            <!-- 搜索结果区域 -->
            <div class="search-results" id="searchResults" style="display: none;"></div>
        </div>
    </div>
</div>
<script src="lib/bootstrap.bundle.min.js" type="text/javascript"></script>
<script src="data.js" type="text/javascript"></script>
<script src="index.js" type="text/javascript"></script>
</body>
</html>
