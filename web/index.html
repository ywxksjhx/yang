<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>首页 - 一个很长的首页 - 以便于你在收藏夹点到它</title>
    <link href="/bootstrap/bootstrap.min.css" rel="stylesheet" type="text/css">
    <script src="/bootstrap/bootstrap.bundle.min.js" type="text/javascript"></script>
    <link href="/web/css/index.css" rel="stylesheet" type="text/css">
</head>

<body>
<div class="container-fluid py-4">
    <div class="row g-4">
        <!-- 左侧导航 -->
        <div class="col-lg-3 col-xl-2">
            <div class="sidebar sticky-top pt-4" style="top: 20px;">
                <div class="nav-list" id="title"></div>
            </div>
        </div>

        <!-- 右侧内容 -->
        <div class="col-lg-9 col-xl-10">
            <div class="links-grid" id="body"></div>
        </div>
    </div>
</div>
<script type="text/javascript" src="data.js"></script>
<script>
    // 设置 favicon
    function getFavicon(url) {
        const match = url.match(/^(https?:\/\/[^\/]+)/);
        if (match) {
            return match[1] + '/favicon.ico';
        }
        return "/img/link.png";
    }

    // 渲染链接卡片
    function renderLinks(key) {
        const $body = document.getElementById('body');
        $body.innerHTML = '';

        const iData = data[key];
        if (!iData) return;

        iData.forEach(item => {
            const ico = getFavicon(item.url);

            const col = document.createElement('div');
            col.className = 'col-6 col-md-4 col-lg-3 col-xl-2 mb-4';

            const card = document.createElement('a');
            card.className = 'link-card';
            card.href = item.url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';

            const imgContainer = document.createElement('div');
            imgContainer.className = 'link-img-container';

            const img = document.createElement('img');
            img.className = 'link-img';
            img.src = ico;
            img.onerror = function () {
                this.src = "../img/link.png";
            };

            const text = document.createElement('p');
            text.className = 'link-text';
            text.textContent = item.text;

            imgContainer.appendChild(img);
            card.appendChild(imgContainer);
            card.appendChild(text);
            col.appendChild(card);
            $body.appendChild(col);
        });
    }

    // 初始化标题按钮
    function initTitles() {
        let firstKey = null;

        for (let key in data) {
            if (!firstKey) firstKey = key;

            const navItem = document.createElement('a');
            navItem.className = 'nav-item';
            navItem.href = 'javascript:void(0)';
            navItem.onclick = () => {
                // 移除所有激活状态
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                });
                // 添加激活状态
                navItem.classList.add('active');
                renderLinks(key);
            };
            navItem.textContent = key;

            document.getElementById('title').appendChild(navItem);
        }

        // 默认选中第一个
        if (firstKey) {
            const firstNav = document.querySelector('.nav-item');
            if (firstNav) firstNav.classList.add('active');
            renderLinks(firstKey);
        }
    }

    // DOM 加载完成后初始化
    document.addEventListener('DOMContentLoaded', initTitles);
</script>
</body>

</html>
