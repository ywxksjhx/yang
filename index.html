<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Yang</title>
    <link rel="stylesheet" type="text/css" href="base.css">
    <link rel="stylesheet" type="text/css" href="index.css">
</head>
<body>
<div id="body"></div>
</body>
<script type="text/javascript" src="jquery/jquery.js"></script>
<script>
    const data = [
        {
            url: "en",
            text: "english"
        }, {
            url: "web",
            text: "web"
        },
    ]

    $(document).ready(() => {
        for (let k in data) {
            let $a = $('<a>', {
                class: "a-link",
                href: data[k].url,
            });

            $a.append($('<img>', {
                class: "link-img",
                src: "img/link.png",
            }));

            $a.append($('<p>', {
                class: "link-p",
                text: data[k].text,
            }));

            $('#body').append($a);
        }
    });
</script>
</html>
